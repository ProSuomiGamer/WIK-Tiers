<!DOCTYPE html>
<html>
<head>
  <title>Tier Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Leaderboard</h1>
<div id="leaderboard"></div>

<div id="profile" class="hidden"></div>

<script>
const tierPoints = {
  "LT5": 1, "HT5": 2,
  "LT4": 3, "HT4": 4,
  "LT3": 6, "HT3": 10,
  "LT2": 20, "HT2": 30,
  "LT1": 45, "HT1": 60
};

fetch("players.json")
  .then(res => res.json())
  .then(players => {

    players.forEach(p => {
      let total = 0;
      for (let mode in p.modes) {
        total += tierPoints[p.modes[mode]];
      }
      p.points = total;
    });

    players.sort((a, b) => b.points - a.points);

    const board = document.getElementById("leaderboard");

    players.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "player";
      div.innerHTML = `
        <span>#${i+1}</span>
        <img src="https://mc-heads.net/avatar/${p.name}">
        <span>${p.name}</span>
        <span>${p.points} pts</span>
      `;

      div.onclick = () => showProfile(p);
      board.appendChild(div);
    });
  });

function showProfile(p) {
  const profile = document.getElementById("profile");
  profile.classList.remove("hidden");

  let modesHTML = "";
  for (let mode in p.modes) {
    modesHTML += `<p>${mode}: ${p.modes[mode]}</p>`;
  }

  profile.innerHTML = `
    <h2>${p.name}</h2>
    <img src="https://mc-heads.net/body/${p.name}">
    <h3>${p.points} points</h3>
    ${modesHTML}
    <button onclick="closeProfile()">Close</button>
  `;
}

function closeProfile() {
  document.getElementById("profile").classList.add("hidden");
}
</script>

</body>
</html>
